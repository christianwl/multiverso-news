<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Multiverso News</title>

    <meta
      name="description"
      content="projeto de estudo desenvolvido com o objetivo de aplicar conceitos fundamentais de HTML e CSS na construção prática de um portal de notícias de games."
    />
    <meta name="author" content="christianwl" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./src/styles/style.css" />

    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <header class="cabecalho">
      <nav class="cabecalho__menu">
        <a href="index.html">
          <img
            class="logo"
            src="./src/assets/img/logos/mn-logo.png"
            alt="Logo de um urso roxo usando um joystick"
          />
        </a>
        <div class="cabecalho__div__links">
          <a class="cabecalho__links" href=""> Games </a>
          <a class="cabecalho__links" href=""> Filmes </a>
          <a class="cabecalho__links" href=""> Musicas </a>
        </div>
        <button id="btn-dark" class="buttomTema">
          <i class="fa-regular"></i>
        </button>
      </nav>
    </header>
    <main class="container">
      <h1 class="container__titulo">Multiverso News</h1>
      <h2 class="container__subtitulo">Últimas notícias</h2>

      <div class="container__artigos" id="news-list"></div>
    </main>
    <footer>
      <div>
        <a class="rodape__footer" href="">
          <img
            class="logo"
            src="./src/assets/img/logos/mn-logo.png"
            alt="Logo de um urso roxo usando um joystick"
          />
          <p class="rodape__footer__titulo">Multiverso News</p>
        </a>
      </div>
      <p class="rodape__c">
        <span>&copy; 2024 christianwl</span>
        <br />
        Projeto para fins educacionais. Todas as marcas, logotipos e imagens de
        jogos são de propriedade de seus respectivos donos.
      </p>
    </footer>
    <script src="./src/scripts/btn-dark.js" defer></script>
    <script src="./src/scripts/main.js" defer></script>
  </body>
</html>
